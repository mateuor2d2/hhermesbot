services:
  bot:
    build: .
    container_name: colegio-bot
    restart: unless-stopped
    environment:
      - RUST_LOG=${RUST_LOG:-info}
      - TELOXIDE_TOKEN=${TELOXIDE_TOKEN}
      - TELOXIDE_TOKEN_TEST=${TELOXIDE_TOKEN_TEST:-}
      - KIMI_API_KEY=${KIMI_API_KEY:-}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - BOT_TOKEN=${BOT_TOKEN:-}
    volumes:
      - colegio-bot-data:/app/data
      - ./config.toml:/app/config.toml:ro
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.colegio-bot.rule=Host(`colegio-bot.paas.cima20.io`)"
      - "traefik.http.routers.colegio-bot.entrypoints=websecure"
      - "traefik.http.routers.colegio-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.colegio-bot.loadbalancer.server.port=3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  colegio-bot-data:

networks:
  dokploy-network:
    external: true
